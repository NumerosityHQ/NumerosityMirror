version: '3.8'

services:
  numerosity:
    build:
      context: .
      dockerfile: Dockerfile
    image: numerosity:latest
    container_name: numerosity-app
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - FIREBASE_CONFIG_PATH=/app/config/Firebase.json
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app-network

  # Optional: Add a reverse proxy
  nginx:
    image: nginx:alpine
    container_name: numerosity-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - numerosity
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  app-data: